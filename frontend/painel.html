<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <base href="/supermercado-proj/">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Painel Administrativo - Supermercado Viva</title>
        <link rel="icon" href="/images/logo.svg" type="image/svg+xml" />
        <link rel="stylesheet" href="/css/style.css" />
    </head>
    <body>
        <div id="header-placeholder"></div>

        <main class="page-container">
            <div class="admin-header">
                <h1>Painel Administrativo</h1>
                <span class="admin-badge">Admin</span>
            </div>

            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="produtos">
                    Produtos
                </button>
                <button class="admin-tab" data-tab="usuarios">Usuários</button>
            </div>

            <div id="tab-produtos" class="admin-layout">
                <div class="admin-card">
                    <h2>Adicionar Produto</h2>
                    <form id="add-product-form">
                        <div class="form-group">
                            <label for="prod-name">Nome *</label>
                            <input
                                type="text"
                                id="prod-name"
                                placeholder="Ex: Banana Prata"
                                required
                            />
                        </div>
                        <div class="form-group">
                            <label for="prod-description">Descrição</label>
                            <textarea
                                id="prod-description"
                                rows="3"
                                placeholder="Descrição do produto"
                            ></textarea>
                        </div>
                        <div class="form-group">
                            <label for="prod-price">Preço (R$) *</label>
                            <input
                                type="number"
                                id="prod-price"
                                step="0.01"
                                min="0"
                                placeholder="0,00"
                                required
                            />
                        </div>
                        <div class="form-group">
                            <label for="prod-category">Categoria *</label>
                            <select id="prod-category" required>
                                <option value="">
                                    Carregando categorias...
                                </option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="prod-image">URL da Imagem</label>
                            <input
                                type="text"
                                id="prod-image"
                                placeholder="https://..."
                            />
                        </div>
                        <button type="submit" class="btn-admin-submit">
                            Adicionar Produto
                        </button>
                        <div
                            id="product-feedback"
                            class="admin-feedback"
                            style="display: none"
                        ></div>
                    </form>
                </div>

                <div class="admin-card admin-products-card">
                    <h2>Produtos Cadastrados</h2>
                    <div id="admin-loading" class="loading">Carregando...</div>
                    <table
                        class="admin-table"
                        id="products-table"
                        style="display: none"
                    >
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Nome</th>
                                <th>Categoria</th>
                                <th>Preço</th>
                            </tr>
                        </thead>
                        <tbody id="products-tbody"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-usuarios" class="admin-layout" style="display: none">
                <div class="admin-card">
                    <h2>Criar Usuário</h2>
                    <form id="add-user-form">
                        <div class="form-group">
                            <label for="user-email">E-mail *</label>
                            <input
                                type="email"
                                id="user-email"
                                placeholder="usuario@email.com"
                                required
                            />
                        </div>
                        <div class="form-group">
                            <label for="user-password">Senha *</label>
                            <input
                                type="password"
                                id="user-password"
                                placeholder="Mínimo 6 caracteres"
                                minlength="6"
                                required
                            />
                        </div>
                        <button type="submit" class="btn-admin-submit">
                            Criar Usuário
                        </button>
                        <div
                            id="user-feedback"
                            class="admin-feedback"
                            style="display: none"
                        ></div>
                    </form>
                </div>

                <div class="admin-card admin-products-card">
                    <h2>Usuários Cadastrados</h2>
                    <div id="users-loading" class="loading">Carregando...</div>
                    <table
                        class="admin-table"
                        id="users-table"
                        style="display: none"
                    >
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>E-mail</th>
                                <th>Role</th>
                                <th>Ativo</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody"></tbody>
                    </table>
                </div>
            </div>
        </main>

        <div id="footer-placeholder"></div>

        <script src="/js/config.js"></script>
        <script src="/js/main.js"></script>
        <script src="/js/painel.js"></script>
    </body>
</html>
