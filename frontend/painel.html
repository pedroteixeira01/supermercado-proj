<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Supermercado Viva</title>
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="page-container">
        <div class="admin-header">
            <h1>Painel Administrativo</h1>
            <span class="admin-badge">Admin</span>
        </div>

        <div class="admin-layout">
            <!-- Formulário de adição de produto -->
            <div class="admin-card">
                <h2>Adicionar Produto</h2>
                <form id="add-product-form">
                    <div class="form-group">
                        <label for="prod-name">Nome *</label>
                        <input type="text" id="prod-name" placeholder="Ex: Banana Prata" required />
                    </div>
                    <div class="form-group">
                        <label for="prod-description">Descrição</label>
                        <textarea id="prod-description" rows="3" placeholder="Descrição do produto"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="prod-price">Preço (R$) *</label>
                        <input type="number" id="prod-price" step="0.01" min="0" placeholder="0,00" required />
                    </div>
                    <div class="form-group">
                        <label for="prod-category">Categoria *</label>
                        <select id="prod-category" required>
                            <option value="">Carregando categorias...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="prod-image">URL da Imagem</label>
                        <input type="text" id="prod-image" placeholder="https://..." />
                    </div>
                    <button type="submit" class="btn-admin-submit">Adicionar Produto</button>
                    <div id="form-feedback" class="admin-feedback" style="display:none;"></div>
                </form>
            </div>

            <!-- Lista de produtos existentes -->
            <div class="admin-card admin-products-card">
                <h2>Produtos Cadastrados</h2>
                <div id="admin-loading" class="loading">Carregando...</div>
                <table class="admin-table" id="products-table" style="display:none;">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nome</th>
                            <th>Categoria</th>
                            <th>Preço</th>
                        </tr>
                    </thead>
                    <tbody id="products-tbody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/js/main.js"></script>
    <script>
        const API = "http://localhost:8000/api/v1";

        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem("token");
            const role = localStorage.getItem("role");

            if (!token || role !== "admin") {
                window.location.href = "index.html";
                return;
            }

            loadCategories();
            loadProducts();

            document.getElementById("add-product-form").addEventListener("submit", handleAddProduct);
        });

        async function loadCategories() {
            const select = document.getElementById("prod-category");
            try {
                const res = await fetch(`${API}/products/categories`);
                if (!res.ok) throw new Error();
                const categories = await res.json();
                select.innerHTML = '<option value="">Selecione a categoria</option>' +
                    categories.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
            } catch {
                select.innerHTML = '<option value="">Erro ao carregar categorias</option>';
            }
        }

        async function loadProducts() {
            const loading = document.getElementById("admin-loading");
            const table = document.getElementById("products-table");
            const tbody = document.getElementById("products-tbody");

            try {
                const res = await fetch(`${API}/products/`);
                if (!res.ok) throw new Error();
                const products = await res.json();

                loading.style.display = "none";
                table.style.display = "table";

                if (products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#888;">Nenhum produto cadastrado.</td></tr>';
                    return;
                }

                tbody.innerHTML = products.map(p => `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.name}</td>
                        <td>${p.category || "—"}</td>
                        <td>R$ ${p.price.toFixed(2).replace(".", ",")}</td>
                    </tr>
                `).join("");
            } catch {
                loading.textContent = "Erro ao carregar produtos.";
            }
        }

        async function handleAddProduct(e) {
            e.preventDefault();
            const token = localStorage.getItem("token");
            const feedback = document.getElementById("form-feedback");
            const submitBtn = e.target.querySelector("button[type=submit]");

            const payload = {
                name: document.getElementById("prod-name").value.trim(),
                description: document.getElementById("prod-description").value.trim() || null,
                price: parseFloat(document.getElementById("prod-price").value),
                category_id: parseInt(document.getElementById("prod-category").value) || null,
                image_url: document.getElementById("prod-image").value.trim() || null,
            };

            submitBtn.disabled = true;
            submitBtn.textContent = "Adicionando...";

            try {
                const res = await fetch(`${API}/products/`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`,
                    },
                    body: JSON.stringify(payload),
                });

                if (res.ok) {
                    showFeedback("Produto adicionado com sucesso!", "success");
                    e.target.reset();
                    loadProducts();
                } else if (res.status === 403) {
                    showFeedback("Sem permissão para realizar esta ação.", "error");
                } else {
                    const err = await res.json().catch(() => ({}));
                    showFeedback(`Erro: ${err.detail || "Tente novamente."}`, "error");
                }
            } catch {
                showFeedback("Erro de conexão com a API.", "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Adicionar Produto";
            }
        }

        function showFeedback(message, type) {
            const el = document.getElementById("form-feedback");
            el.textContent = message;
            el.className = `admin-feedback admin-feedback--${type}`;
            el.style.display = "block";
            setTimeout(() => { el.style.display = "none"; }, 4000);
        }
    </script>
</body>
</html>
