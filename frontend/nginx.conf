server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve static files from root (e.g. http://localhost/)
    location / {
        try_files $uri $uri/ =404;
    }

    # Mirror the GitHub Pages subdirectory path locally
    # so <base href="/supermercado-proj/"> works in both environments
    location /supermercado-proj/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ =404;
    }
}
