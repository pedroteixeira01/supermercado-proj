<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <base href="/supermercado-proj/">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Contato - Supermercado Viva</title>
        <link rel="icon" href="images/logo.svg" type="image/svg+xml" />
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <div id="header-placeholder"></div>

        <main class="page-container">
            <h1>Fale Conosco</h1>
            <div class="contact-grid">
                <div class="contact-form">
                    <form id="contactForm">
                        <div class="form-group">
                            <label for="name">Nome:</label>
                            <input type="text" id="name" name="name" required />
                        </div>
                        <div class="form-group">
                            <label for="email">E-mail:</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                required
                            />
                        </div>
                        <div class="form-group">
                            <label for="message">Mensagem:</label>
                            <textarea
                                id="message"
                                name="message"
                                rows="5"
                                required
                            ></textarea>
                        </div>
                        <button type="submit" class="btn">
                            Enviar Mensagem
                        </button>
                    </form>
                    <div id="form-msg" class="msg-hidden">
                        Mensagem enviada com sucesso!
                    </div>
                </div>

                <div class="contact-info">
                    <h3>Nossos Canais</h3>
                    <p><strong>Telefone:</strong> (21) 9999-9999</p>
                    <p><strong>Email:</strong> contato@superviva.com</p>
                    <p>
                        <strong>Endereço:</strong> Rua Ali na Esquina, 123 -
                        Centro
                    </p>

                    <h3>Redes Sociais & Parceiros</h3>
                    <ul class="social-links">
                        <li><a href="#">Instagram @superviva</a></li>
                        <li><a href="#">Facebook /superviva</a></li>
                        <li><a href="#">Parceiro: Distribuidora Silva</a></li>
                    </ul>
                </div>
            </div>
        </main>

        <div id="footer-placeholder"></div>

        <script src="js/config.js"></script>
        <script src="js/main.js"></script>
    </body>
</html>
