<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Supermercado Viva</title>
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="page-container">
        <div id="checkout-view">
            <h1>Finalizar Pedido</h1>
            <div class="checkout-layout">
                <div class="checkout-items-section">
                    <h2>Itens do Pedido</h2>
                    <div id="checkout-items"></div>
                </div>
                <div class="checkout-summary-section">
                    <h2>Resumo</h2>
                    <div class="checkout-summary-total" id="checkout-total">R$ 0,00</div>
                    <button class="btn-checkout" id="confirm-btn">Confirmar Pedido</button>
                    <a href="produtos.html" class="btn-back">← Voltar para Produtos</a>
                </div>
            </div>
        </div>

        <div id="success-view" style="display:none;" class="order-success">
            <div class="success-icon">✓</div>
            <h1>Pedido Confirmado!</h1>
            <p>Obrigado por comprar no Supermercado Viva! Seu pedido foi recebido e está sendo processado.</p>
            <a href="produtos.html" class="btn-primary">Continuar Comprando</a>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('token')) {
                window.location.href = 'login.html';
                return;
            }
            renderCheckout();
            document.getElementById('confirm-btn').addEventListener('click', confirmOrder);
        });

        function renderCheckout() {
            const checkoutCart = JSON.parse(localStorage.getItem('cart') || '[]');
            const itemsEl = document.getElementById('checkout-items');
            const totalEl = document.getElementById('checkout-total');
            const confirmBtn = document.getElementById('confirm-btn');

            if (checkoutCart.length === 0) {
                itemsEl.innerHTML = '<p>Seu carrinho está vazio. <a href="produtos.html">Ver produtos</a></p>';
                confirmBtn.style.display = 'none';
                return;
            }

            let total = 0;
            itemsEl.innerHTML = checkoutCart.map(item => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                return `
                    <div class="checkout-item">
                        <div class="checkout-item-info">
                            <span class="checkout-item-name">${item.name}</span>
                            <span class="checkout-item-qty">Qtd: ${item.quantity}</span>
                        </div>
                        <span class="checkout-item-subtotal">R$ ${subtotal.toFixed(2).replace('.', ',')}</span>
                    </div>
                `;
            }).join('');

            totalEl.textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        async function confirmOrder() {
            const checkoutCart = JSON.parse(localStorage.getItem('cart') || '[]');
            const token = localStorage.getItem('token');
            const btn = document.getElementById('confirm-btn');

            btn.disabled = true;
            btn.textContent = 'Processando...';

            try {
                const response = await fetch('http://localhost:8000/api/v1/orders/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        items: checkoutCart.map(item => ({
                            product_id: item.id,
                            quantity: item.quantity
                        }))
                    })
                });

                if (response.ok) {
                    localStorage.removeItem('cart');
                    document.getElementById('checkout-view').style.display = 'none';
                    document.getElementById('success-view').style.display = 'block';
                } else if (response.status === 401 || response.status === 403) {
                    alert('Sessão expirada. Faça login novamente.');
                    localStorage.removeItem('token');
                    window.location.href = 'login.html';
                } else {
                    const err = await response.json().catch(() => ({}));
                    alert(`Erro: ${err.detail || 'Não foi possível criar o pedido. Tente novamente.'}`);
                    btn.disabled = false;
                    btn.textContent = 'Confirmar Pedido';
                }
            } catch (e) {
                alert('Erro de conexão. Verifique se a API está rodando.');
                btn.disabled = false;
                btn.textContent = 'Confirmar Pedido';
            }
        }
    </script>
</body>
</html>
